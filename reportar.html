<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidente</title>
</head>

<body>

    <header>
        <h1>Centro de Soporte Tecnológico</h1>
        <p>Formulario de Registro de Incidentes</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="reportar.html">Reportar Incidente</a></li>
            <li><a href="tickets.html">Tickets</a></li>
        </ul>
    </nav>

    <main>

        <section>

            <h2>Formulario de Incidentes</h2>

            <article>

                <h3>Registro de Incidente</h3>

                <form>

                    <label for="titulo">Título del incidente:</label>
                    <br><br>

                    <input type="text" id="titulo" name="titulo">

                    <br><br>

                    <label for="categoria">Categoría:</label>
                    <br><br>

                    <select id="categoria" name="categoria">
                        <option>Red</option>
                        <option>Hardware</option>
                        <option>Software</option>
                    </select>

                    <br><br>

                    <p>Prioridad:</p>

                    <input type="radio" id="alta" name="prioridad">
                    <label for="alta">Alta</label>

                    <br>

                    <input type="radio" id="media" name="prioridad">
                    <label for="media">Media</label>

                    <br>

                    <input type="radio" id="baja" name="prioridad">
                    <label for="baja">Baja</label>

                    <br><br>

                    <label for="descripcion">
                        Descripción del incidente:
                    </label>

                    <br><br>

                    <textarea id="descripcion" rows="6" cols="40"></textarea>

                    <br><br>

                    <button type="submit">
                        Enviar Reporte
                    </button>

                </form>

            </article>

        </section>

    </main>

    <footer>
        <p>Universidad Técnica de Manabí - Desarrollo de Sistemas Informáticos</p>
    </footer>

</body>

</html>
